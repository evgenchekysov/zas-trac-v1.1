<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- Критически важная строка для iPhone 13 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZAS-TRAC LOGIN</title>
    <style>
        /* Принудительные стили для мобильных устройств */
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #0f172a !important; 
            display: flex; align-items: center; justify-content: center;
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden;
        }
        .login-card { 
            background: #1e293b; 
            width: 85% !important; /* На телефоне будет широкой */
            max-width: 350px; 
            padding: 40px 25px; 
            border-radius: 30px; 
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            border: 1px solid #334155;
        }
        h1 { color: #60a5fa; margin: 0 0 5px 0; font-size: 32px; font-weight: 900; letter-spacing: -1px; }
        
        /* Та самая красная метка для проверки кэша */
        .ver-tag { 
            background: #ef4444; color: white; display: inline-block; 
            padding: 2px 10px; border-radius: 50px; font-size: 9px; 
            font-weight: bold; margin-bottom: 25px; text-transform: uppercase;
        }

        .input-group { text-align: left; margin-bottom: 15px; }
        label { color: #64748b; font-size: 10px; font-weight: bold; text-transform: uppercase; margin-left: 10px; }
        
        input { 
            width: 100%; padding: 18px; margin-top: 5px;
            background: #0f172a; border: 2px solid #334155; 
            color: white; border-radius: 15px; font-size: 16px; /* 16px - стандарт для iOS */
            box-sizing: border-box; outline: none;
        }
        input:focus { border-color: #3b82f6; }

        button { 
            width: 100%; padding: 18px; margin-top: 15px;
            background: #2563eb; color: white; border: none; 
            border-radius: 15px; font-size: 18px; font-weight: 900;
            text-transform: uppercase; cursor: pointer;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
        }
        button:active { transform: scale(0.97); background: #1d4ed8; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>ZAS-TRAC</h1>
        <div class="ver-tag">МОБИЛЬНАЯ ВЕРСИЯ 1.5</div>
        
        <div class="input-group">
            <label>Логин</label>
            <input type="text" id="login" placeholder="username" autocomplete="off">
        </div>
        
        <div class="input-group">
            <label>Пароль</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        
        <button onclick="doLogin()">Войти в систему</button>
    </div>

    <script>
        async function doLogin() {
            const l = document.getElementById('login').value;
            const p = document.getElementById('password').value;
            if(!l || !p) return;
            
            // Используем относительный путь для универсальности
            const url = "/auth/login?username=" + encodeURIComponent(l) + "&password=" + encodeURIComponent(p);
            
            try {
                const res = await fetch(url, { method: 'POST' });
                if(res.ok) {
                    const data = await res.json();
                    localStorage.setItem('userRole', data.role);
                    localStorage.setItem('userName', data.full_name);
                    
                 // Редирект: админы в панель, обычные юзеры в ХАБ
                    window.location.href = (data.role === 'superadmin' || data.role === 'admin') 
                     ? '/admin-panel' 
                     : '/user-home';
                } else { 
                    alert("⚠️ Неверный логин или пароль"); 
                }
            } catch (e) { 
                alert("❌ Ошибка связи с сервером"); 
            }
        }
    </script>
</body>
</html>
