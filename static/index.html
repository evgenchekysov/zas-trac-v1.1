<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZAS-TRAC: Новая заявка</title>
    <script src="/static/html5-qrcode.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white font-sans min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-sm bg-slate-900 rounded-[2.5rem] p-8 shadow-2xl border border-slate-800 relative">
        
        <!-- НАВИГАЦИЯ И ШАПКА -->
        <header class="text-center mb-8 relative">
            <button onclick="goBack()" class="absolute left-0 top-1 text-slate-500 hover:text-blue-400 text-[10px] font-black uppercase tracking-widest transition-all">
                ← Назад
            </button>
            <h1 class="text-3xl font-black bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent italic uppercase tracking-tighter">
                ZAS-TRAC
            </h1>
            <p id="user-display" class="text-slate-600 text-[9px] font-bold uppercase tracking-[0.2em] mt-1 italic">...</p>
        </header>

        <div id="reader" style="display:none"></div>

        <!-- ШАГ 1: ВЫБОР ОБОРУДОВАНИЯ -->
        <div id="scan-section" class="space-y-6 animate-in fade-in zoom-in-95 duration-300">
            <label class="block w-full bg-blue-600 active:bg-blue-700 text-white py-8 rounded-[2rem] font-black text-center text-xl cursor-pointer shadow-xl active:scale-95 transition-all">
                <span class="block text-3xl mb-2">📸</span>
                ФОТО QR-КОДА
                <input type="file" id="qr-input" accept="image/*" capture="environment" class="hidden">
            </label>

            <div class="relative flex items-center py-2">
                <div class="flex-grow border-t border-slate-800"></div>
                <span class="flex-shrink mx-4 text-slate-700 text-[9px] font-black uppercase">или код вручную</span>
                <div class="flex-grow border-t border-slate-800"></div>
            </div>

            <div class="flex gap-2">
                <input type="text" id="manual-qr" placeholder="Напр: HEN100..." 
                    class="flex-1 bg-slate-950 border border-slate-800 rounded-2xl p-4 text-white focus:ring-2 focus:ring-blue-500 outline-none uppercase font-bold text-sm">
                <button onclick="fetchInfo(document.getElementById('manual-qr').value)" 
                    class="bg-slate-800 px-6 rounded-2xl font-black text-lg active:scale-90 transition-all hover:bg-slate-700">
                    OK
                </button>
            </div>
        </div>

        <!-- ШАГ 2: ОПИСАНИЕ ПРОБЛЕМЫ -->
        <div id="ticket-form" class="hidden animate-in slide-in-from-bottom-8 fade-in duration-500">
            <div class="mb-6 p-5 bg-slate-800/50 rounded-3xl border border-slate-700">
                <p class="text-[9px] text-slate-500 uppercase font-black mb-1">Объект опознан:</p>
                <p id="asset-name" class="font-black text-lg text-emerald-400 uppercase leading-tight italic">...</p>
                <input type="hidden" id="qr-code-val">
            </div>

            <textarea id="description" rows="4" 
                class="w-full bg-slate-950 border border-slate-800 rounded-2xl p-5 text-white focus:ring-2 focus:ring-blue-500 outline-none text-base placeholder-slate-800" 
                placeholder="Что именно случилось?"></textarea>
            
            <button onclick="sendTicket()" class="w-full bg-emerald-600 active:bg-emerald-700 text-white py-5 rounded-3xl font-black text-xl mt-6 shadow-xl active:scale-95 transition-all uppercase">
                Отправить
            </button>
            <button onclick="location.reload()" class="w-full mt-4 text-slate-600 text-[10px] font-bold uppercase tracking-widest">Сбросить</button>
        </div>
    </div>

    <script src="https://unpkg.com"></script>
    <script>
        /* === БЛОК 1: ИНИЦИАЛИЗАЦИЯ И ДАННЫЕ ПОЛЬЗОВАТЕЛЯ === */
        const userName = localStorage.getItem('userName') || 'Гость';
        const userRole = localStorage.getItem('userRole') || 'user';
        const html5QrCode = new Html5Qrcode("reader"); // "reader" — это ID div-контейнера в HTML
        
        document.getElementById('user-display').innerText = "Заявитель: " + userName;

        function goBack() {
            window.location.href = (userRole === 'superadmin' || userRole === 'admin') ? '/admin-panel' : '/user-home';
        }

        /* === БЛОК 2: УНИВЕРСАЛЬНЫЙ ЖИВОЙ СКАНЕР (ДЛЯ ВСЕХ УСТРОЙСТВ) === */
        async function startScanner() {
            const config = { 
                fps: 10, 
                qrbox: { width: 250, height: 250 },
                aspectRatio: 1.0,
                videoConstraints: { facingMode: "environment", focusMode: "continuous" }
            };

            // Запускаем видеопоток (работает на iPhone через HTTPS)
            html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
                // Если код считан — останавливаем камеру и ищем в базе
                html5QrCode.stop().then(() => fetchInfo(decodedText));
            }).catch(err => {
                console.warn("Живой сканер не запущен (вероятно, нет HTTPS). Используем ручной выбор фото.");
                document.getElementById('manual-upload-ui').classList.remove('hidden');
            });
        }

        /* === БЛОК 3: ЗАПАСНОЙ ВАРИАНТ (ЗАГРУЗКА ФОТО) === */
        document.getElementById('qr-input').addEventListener('change', async e => {
            if (e.target.files.length === 0) return;
            document.getElementById('user-display').innerText = "⌛ АНАЛИЗ СНИМКА...";
            
            html5QrCode.scanFile(e.target.files[0], true)
                .then(decodedText => fetchInfo(decodedText))
                .catch(err => {
                    alert("QR не распознан. Сделайте фото четче или введите вручную.");
                    document.getElementById('user-display').innerText = "Заявитель: " + userName;
                });
        });

        /* === БЛОК 4: ПОИСК В БАЗЕ (ZAS-TRAC API) === */
        async function fetchInfo(qr) {
            if(!qr) return;
            const cleanCode = qr.trim().toUpperCase(); // Игнорируем регистр
            
            try {
                const res = await fetch(`/scan/${cleanCode}`);
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('asset-name').innerText = data.name;
                    document.getElementById('qr-code-val').value = data.qr_code;
                    
                    // Переключение на форму заявки
                    document.getElementById('scan-section').classList.add('hidden');
                    document.getElementById('ticket-form').classList.remove('hidden');
                    document.getElementById('user-display').innerText = "Объект: " + data.name;
                } else {
                    alert(`Код "${cleanCode}" не найден в реестре ZAS-TRAC`);
                    location.reload(); // Перезагружаем для повторного скана
                }
            } catch (e) {
                alert("Ошибка связи с сервером. Проверьте сеть.");
            }
        }

        /* === БЛОК 5: ОТПРАВКА ЗАЯВКИ === */
        async function sendTicket() {
            const qr = document.getElementById('qr-code-val').value;
            const desc = document.getElementById('description').value;
            
            if(!desc) return alert("Опишите проблему");

            // Используем POST-запрос с Query-параметрами (как в твоем main.py)
            const url = `/tickets/create?qr_code=${encodeURIComponent(qr)}&description=${encodeURIComponent(desc)}`;
            
            try {
                const res = await fetch(url, { method: 'POST' });
                if (res.ok) {
                    const result = await res.json();
                    alert(`✅ Заявка №${result.id} создана!`);
                    goBack();
                } else {
                    alert("Ошибка сервера при сохранении");
                }
            } catch (e) {
                alert("Ошибка сети");
            }
        }

        // Запуск при загрузке
        window.onload = startScanner;
    </script>
</body>
</html>
