<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAS-TRAC Pro | Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* === БЛОК 1: ЦВЕТОВЫЕ ПЕРЕМЕННЫЕ (WINDOWS & DARK) === */
        :root {
            --bg: #ffffff; --nav: #f3f3f3; --card: #ffffff; --border: #e5e5e5;
            --text: #1a1a1a; --grid: rgba(0, 0, 0, 0.05); --accent: #0067c0;
        }
        .dark {
            --bg: #0f172a; --nav: #1e293b; --card: #1e293b; --border: #334155;
            --text: #f1f5f9; --grid: rgba(255, 255, 255, 0.05); --accent: #3b82f6;
        }

        body { background: var(--bg); color: var(--text); transition: 0.3s; overflow-x: hidden; }
        .glass-card { background: var(--card); border: 1px solid var(--border); }
        
        /* === БЛОК 2: ГЕОМЕТРИЯ (ИСПРАВЛЕНО) === */
        .timeline-grid-layout { 
            display: grid; 
            /* 250px на имена + 17 равных колонок по 80px минимум */
            grid-template-columns: 250px repeat(17, minmax(80px, 1fr)); 
            width: 100%;
        }

        .timeline-grid-bg { 
            grid-column: 2 / 19; 
            position: relative; 
            background-image: linear-gradient(to right, var(--grid) 1px, transparent 1px); 
            /* Линии ровно по количеству часов (17) */
            background-size: calc(100% / 17) 100%; 
            min-height: 100px; 
        }
        
        /* === БЛОК 3: СЕССИИ И МАРКЕР ВРЕМЕНИ === */
        .session-bar { 
            position: absolute; z-index: 30; height: 42px; border-left-width: 4px; border-radius: 8px;
            display: flex; align-items: center; padding: 0 10px; font-weight: 900; font-size: 9px;
            text-transform: uppercase; box-shadow: 0 4px 6px rgba(0,0,0,0.1); cursor: pointer; overflow: hidden;
        }

        #current-time-marker { position: absolute; top: 0; bottom: 0; width: 2px; background: #ef4444; z-index: 60; pointer-events: none; }
        #current-time-badge { 
            position: absolute; top: -20px; left: 50%; transform: translateX(-50%); 
            background: #ef4444; color: white; padding: 2px 6px; border-radius: 4px; 
            font-size: 10px; font-weight: 900; white-space: nowrap; 
        }
        
        .tab-active { border-bottom: 3px solid var(--accent); color: var(--accent) !important; }
        .modal-bg { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(8px); }
        .custom-scrollbar::-webkit-scrollbar { height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body class="font-sans antialiased">

    <!-- === БЛОК 4: НАВИГАЦИЯ === -->
    <nav class="sticky top-0 z-50 p-4 px-6 flex justify-between items-center border-b border-slate-200 dark:border-slate-800 backdrop-blur-md" style="background: var(--nav);">
        <div class="flex items-center gap-6">
            <h1 class="text-xl font-black tracking-tighter text-blue-600 uppercase italic">ZAS-TRAC ADM</h1>
            <div class="flex gap-4 text-[11px] font-bold uppercase tracking-widest text-slate-500">
                <button onclick="switchTab('tickets')" id="btn-tickets" class="tab-active py-2">Реестр</button>
                <button onclick="switchTab('workers')" id="btn-workers" class="py-2">График ОЭ</button>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="toggleTheme()" class="p-2 rounded-lg glass-card text-sm" id="theme-icon">🌙</button>
            <button onclick="window.location.href='/create-ticket'" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase shadow-lg shadow-blue-600/20 active:scale-95 transition-all">+ Подать заявку</button>
        </div>
    </nav>

    <main class="max-w-[1800px] mx-auto p-6">
        <!-- === БЛОК 5: ФИЛЬТРЫ И ШАПКА ТАБОВ === -->
        <div class="flex justify-between items-end mb-8">
            <div>
                <h2 id="tab-title" class="text-2xl font-black uppercase text-blue-600 mb-2">Реестр задач</h2>
                <div class="flex gap-2">
                    <div id="month-filter" class="flex items-center gap-1">
                        <button onclick="changeMonth(-1)" class="glass-card p-2 rounded-lg text-xs">◀</button>
                        <input type="month" id="calendar-month" onchange="loadData()" class="glass-card rounded-lg px-4 py-2 text-xs font-bold uppercase outline-none">
                        <button onclick="changeMonth(1)" class="glass-card p-2 rounded-lg text-xs">▶</button>
                    </div>
                    <div id="day-filter" class="hidden flex items-center gap-1">
                        <button onclick="changeDate(-1)" class="glass-card p-2 rounded-lg text-xs">◀</button>
                        <input type="date" id="calendar-date" onchange="loadData()" class="glass-card rounded-lg px-4 py-2 text-xs font-bold uppercase outline-none">
                        <button onclick="changeDate(1)" class="glass-card p-2 rounded-lg text-xs">▶</button>
                    </div>
                    <button onclick="setToday()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase">Сегодня</button>
                </div>
            </div>
        </div>

        <!-- === БЛОК 6: ВКЛАДКА РЕЕСТР === -->
        <div id="tab-tickets" class="glass-card rounded-2xl overflow-hidden shadow-sm animate-in fade-in duration-300">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-500/5 text-[10px] font-black uppercase text-slate-500 border-b">
                        <th class="p-4 w-16">ID</th>
                        <th class="p-4 w-48">Объект</th>
                        <th class="p-4">Описание</th>
                        <th class="p-4 w-32 text-center">Статус</th>
                        <th class="p-4 w-48 text-center">Команда</th>
                    </tr>
                </thead>
                <tbody id="tickets-list-body"></tbody>
            </table>
        </div>

        <!-- === БЛОК 7: ВКЛАДКА ГРАФИК === -->
        <div id="tab-workers" class="hidden glass-card rounded-2xl overflow-hidden overflow-x-auto custom-scrollbar shadow-2xl animate-in slide-in-from-bottom-2">
            <div class="timeline-grid-layout bg-slate-500/5 font-black text-[9px] uppercase border-b sticky top-0 z-30">
                <div class="p-4 border-r sticky left-0 z-30 shadow-md" style="background: var(--nav);">Сотрудники ОЭ</div>
                <div id="timeline-hours-header" class="contents italic"></div>
            </div>
            <div id="timeline-body-wrapper" class="relative"></div>
        </div>
    </main>

    <!-- === БЛОК 8: МОДАЛКИ (ДЕТАЛИ И НАЗНАЧЕНИЕ) === -->
    <div id="m-ticket" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 modal-bg">
        <div class="glass-card w-full max-w-md rounded-[2.5rem] p-8 relative shadow-2xl">
            <button onclick="closeModals()" class="absolute top-6 right-6 text-2xl font-bold transition-colors hover:text-red-500">&times;</button>
            <p id="mt-id" class="text-blue-600 font-black text-[10px] mb-1">#00</p>
            <h3 id="mt-asset" class="text-2xl font-black uppercase italic mb-4">Asset</h3>
            <div id="mt-desc" class="bg-slate-500/5 p-5 rounded-2xl mb-6 text-xs italic text-slate-500 border border-slate-500/10"></div>
            <div id="mt-actions" class="grid grid-cols-3 gap-2"></div>
        </div>
    </div>

    <div id="m-assign" class="hidden fixed inset-0 z-[110] flex items-center justify-center p-4 modal-bg">
        <div class="glass-card w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl">
            <h3 class="text-xl font-black uppercase italic mb-6 text-blue-600 flex justify-between items-center">Назначить <span id="selected-count" class="bg-blue-600 text-white text-[10px] px-3 py-1 rounded-full">0</span></h3>
            <div id="assign-list" class="space-y-2 mb-8 max-h-64 overflow-y-auto pr-2 custom-scrollbar"></div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="confirmMultipleAssign()" class="bg-blue-600 text-white py-4 rounded-xl font-black uppercase text-[10px] shadow-lg shadow-blue-600/20 active:scale-95 transition-all">Подтвердить</button>
                <button onclick="closeModals()" class="glass-card py-4 rounded-xl font-black uppercase text-[10px] hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">Отмена</button>
            </div>
        </div>
    </div>

    <script>

        /* === БЛОК 9: ГЛОБАЛЬНЫЕ НАСТРОЙКИ И МАТЕМАТИКА === */
        const WORK_START = 6, WORK_END = 23;
        const TOTAL_MINS = (WORK_END - WORK_START) * 60; // Ровно 1020 минут (17 часов)
        let allTickets = [], currentTID = null, selectedW = [];

        window.onload = () => {
            initHeader();
            setToday();
            applySavedTheme();
            // Обновляем данные и линию каждые 15 секунд
            setInterval(() => { loadData(); updateMarker(); }, 15000);
        };

        // Точный расчет процента от времени ISO для расположения на сетке (0-100%)
        function getPos(isoStr) {
            if (!isoStr) return 0;
            const d = new Date(isoStr);
            
            // Считаем минуты, прошедшие с 06:00:00
            const mins = (d.getHours() - WORK_START) * 60 + d.getMinutes();
            
            // Вычисляем процент от общей длительности (1020 мин)
            const percent = (mins / TOTAL_MINS) * 100;
            
            // Ограничиваем, чтобы блоки не вылезали за границы 06:00-23:00
            return Math.max(0, Math.min(100, percent));
        }

        function initHeader() {
            const h = document.getElementById('timeline-hours-header');
            if (!h) return;
            
            h.innerHTML = ''; // Очищаем перед отрисовкой
            
            // Отрисовываем ровно 17 колонок (от 6 до 22 включительно)
            for (let i = WORK_START; i < WORK_END; i++) {
                h.innerHTML += `
                    <div class="border-r border-slate-500/10 py-3 text-center text-blue-500 font-bold text-[10px]">
                        ${i}:00
                    </div>`;
            }
        }

        /* === БЛОК 10: ЗАГРУЗКА И ОБРАБОТКА ДАННЫХ === */
        async function loadData() {
            try {
                const mInput = document.getElementById('calendar-month').value;
                const dInput = document.getElementById('calendar-date').value;
                const isWorkers = !document.getElementById('tab-workers').classList.contains('hidden');
                
                let url;
                if (isWorkers) {
                    const [y, m, d] = dInput.split('-');
                    url = `/admin/all-tickets?day=${d}&month=${m}&year=${y}`;
                } else {
                    const [y, m] = mInput.split('-');
                    url = `/admin/all-tickets?month=${m}&year=${y}`;
                }

                const [resT, resW] = await Promise.all([
                    fetch(url).then(r => r.json()),
                    fetch('/admin/workers').then(r => r.json())
                ]);

                allTickets = resT || [];
                renderTable();
                renderTimeline(resW || []);
            } catch (e) { console.error("Sync Error", e); }
        }

        /* === БЛОК 11: ОТРИСОВКА РЕЕСТРА (СОРТИРОВКА) === */
        function renderTable() {
            const tbody = document.getElementById('tickets-list-body');
            const priority = { 'new': 1, 'assigned': 2, 'in_progress': 3, 'paused': 4, 'closed': 5 };
            const colors = { 'new': 'text-blue-600', 'in_progress': 'text-emerald-500', 'paused': 'text-amber-500', 'closed': 'opacity-40 grayscale' };
            
            const sorted = [...allTickets].sort((a, b) => (priority[a.status] || 9) - (priority[b.status] || 9));

            tbody.innerHTML = sorted.map(t => `
                <tr class="border-b border-slate-500/10 hover:bg-blue-500/5 transition-all cursor-pointer" onclick="openTicket(${t.id})">
                    <td class="p-4 font-mono text-[10px] opacity-40">#${t.id}</td>
                    <td class="p-4 font-black text-xs uppercase">${t.asset_name}<br><span class="text-[9px] font-normal opacity-40">${t.qr_code || '---'}</span></td>
                    <td class="p-4 text-xs italic text-slate-500">${t.description || ''}</td>
                    <td class="p-4 text-center"><span class="px-2 py-1 rounded border text-[9px] font-black uppercase ${colors[t.status]} border-current bg-current/10">${t.status}</span></td>
                    <td class="p-4 text-[9px] font-black text-blue-600 text-center uppercase italic">${(t.worker_names || []).join(', ') || 'Ожидает'}</td>
                </tr>
            `).join('');
        }

        /* === БЛОК 12: ГРАФИК (МНОГОУРОВНЕВОСТЬ И ФИЛЬТР ДАТЫ) === */
        function renderTimeline(workers) {
            const wrapper = document.getElementById('timeline-body-wrapper');
            const selectedDate = document.getElementById('calendar-date').value; // "2026-02-26"
            if (!wrapper) return;
            
            // Очищаем и создаем маркер
            wrapper.innerHTML = '<div id="current-time-marker" class="hidden"><div id="current-time-badge">00:00</div></div>';
            
            workers.forEach(w => {
                const row = document.createElement('div');
                row.className = "timeline-grid-layout border-b border-slate-500/10 min-h-[100px] relative hover:bg-slate-500/5 transition-all";
                
                const sidebar = document.createElement('div');
                sidebar.className = "worker-sidebar";
                sidebar.innerHTML = `
                    <div class="flex flex-col py-4">
                        <span class="truncate w-full text-slate-700 dark:text-slate-200 font-black">${w.full_name}</span>
                        <span class="text-[8px] font-black ${w.active_tasks > 0 ? 'text-amber-500':'text-emerald-500'} uppercase">
                            ${w.active_tasks > 0 ? `ЗАНЯТ (${w.active_tasks})` : 'СВОБОДЕН'}
                        </span>
                    </div>`;

                const grid = document.createElement('div');
                grid.className = "timeline-grid-bg relative";
                grid.style.gridColumn = "2 / 19";

                // 1. ФИЛЬТРАЦИЯ: только текущий воркер и СТРОГО выбранная дата
                const workerName = w.full_name.toLowerCase();
                const dailyTasks = allTickets.filter(t => {
                    const isWorker = t.worker_names?.some(n => workerName.includes(n.toLowerCase()));
                    const isSameDay = t.created_at?.split('T')[0] === selectedDate; 
                    return isWorker && isSameDay;
                });

                // 2. ЛОГИКА СМЕЩЕНИЯ (Levels/Этажи)
                let levels = []; // Время окончания задач на каждом уровне

                dailyTasks.forEach(t => {
                    (t.sessions || []).forEach(s => {
                        // ВНУТРЕННЯЯ ФУНКЦИЯ СОЗДАНИЯ БАРА (чтобы не было ReferenceError)
                        const bar = createSessionBarInstance(t, s);
                        if (bar) {
                            const startUnix = new Date(s.start_time).getTime();
                            const endUnix = s.end_time ? new Date(s.end_time).getTime() : new Date().getTime();

                            // Ищем этаж, где работа закончилась раньше, чем началась текущая
                            let levelIndex = levels.findIndex(lvlEnd => lvlEnd <= startUnix);
                            
                            if (levelIndex === -1) {
                                levelIndex = levels.length;
                                levels.push(endUnix);
                            } else {
                                levels[levelIndex] = endUnix;
                            }

                            // Смещение вниз: 15px отступ + (индекс этажа * высота бара 42px + зазор 6px)
                            bar.style.top = `${15 + (levelIndex * 48)}px`;
                            grid.appendChild(bar);
                        }
                    });
                });

                // Авто-высота строки в зависимости от количества "этажей" задач
                row.style.height = `${Math.max(100, levels.length * 55 + 20)}px`;

                row.append(sidebar, grid);
                wrapper.appendChild(row);
            });
            updateMarker();
        }

        // Вспомогательная функция (вынесена для надежности)
        function createSessionBarInstance(t, s) {
            if (!s || !s.start_time) return null;
            const bar = document.createElement('div');
            const colors = { 'new': 'bg-blue-600', 'in_progress': 'bg-emerald-600', 'paused': 'bg-amber-500' };
            bar.className = `session-bar ${colors[t.status] || 'bg-slate-500'} text-white border-l-4 border-black/20 shadow-md`;

            const left = getPos(s.start_time);
            let width = 3;
            if (s.end_time) {
                width = getPos(s.end_time) - left;
            } else if (t.status === 'in_progress') {
                width = getPos(new Date().toISOString()) - left;
            }

            if (left < 0 || left >= 100) return null;
            bar.style.left = left + '%';
            bar.style.width = Math.max(width, 2) + '%';
            bar.innerHTML = `<span class="truncate px-2 font-black text-[9px] uppercase">${t.asset_name}</span>`;
            bar.onclick = (e) => { e.stopPropagation(); openTicket(t.id); };
            return bar;
        }

        /* === БЛОК 13: ИНТЕРФЕЙС И ТЕМЫ === */
        function toggleTheme() {
            const isDark = document.body.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('theme-icon').innerText = isDark ? '☀️' : '🌙';
        }
        function applySavedTheme() {
            if (localStorage.getItem('theme') === 'dark') { document.body.classList.add('dark'); document.getElementById('theme-icon').innerText = '☀️'; }
        }
        function changeMonth(delta) {
            const input = document.getElementById('calendar-month');
            let [y, m] = input.value.split('-').map(Number);
            const d = new Date(y, (m - 1) + delta, 1);
            input.value = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
            loadData();
        }
        function changeDate(delta) {
            const p = document.getElementById('calendar-date');
            const d = new Date(p.value); d.setDate(d.getDate() + delta);
            p.valueAsDate = d; loadData();
        }
        function setToday() {
            const n = new Date();
            document.getElementById('calendar-date').valueAsDate = n;
            document.getElementById('calendar-month').value = n.toISOString().slice(0, 7);
            loadData();
        }
        function switchTab(tab) {
            document.getElementById('tab-tickets').classList.toggle('hidden', tab !== 'tickets');
            document.getElementById('tab-workers').classList.toggle('hidden', tab !== 'workers');
            document.getElementById('btn-tickets').classList.toggle('tab-active', tab === 'tickets');
            document.getElementById('btn-workers').classList.toggle('tab-active', tab === 'workers');
            document.getElementById('day-filter').classList.toggle('hidden', tab !== 'workers');
            document.getElementById('month-filter').classList.toggle('hidden', tab !== 'tickets');
            document.getElementById('tab-title').innerText = tab === 'tickets' ? 'Реестр задач' : 'График ОЭ';
            loadData();
        }
        function openTicket(id) {
            currentTID = id; const t = allTickets.find(x => x.id === id);
            document.getElementById('mt-id').innerText = `#${t.id}`;
            document.getElementById('mt-asset').innerText = t.asset_name;
            document.getElementById('mt-desc').innerText = t.description || '';
            const acts = document.getElementById('mt-actions');
            if(t.status !== 'closed') {
                acts.innerHTML = `
                <button onclick="showAssignModal()" class="bg-blue-600 text-white p-4 rounded-xl font-black uppercase text-[9px] shadow-lg shadow-blue-600/20 active:scale-95 transition-all">Команда</button>
                <button onclick="setStatus('${t.status==='paused'?'in_progress':'paused'}')" class="bg-amber-500 text-white p-4 rounded-xl font-black uppercase text-[9px] active:scale-95 transition-all">${t.status==='paused'?'Пуск':'Пауза'}</button>
                <button onclick="setStatus('closed')" class="bg-red-600 text-white p-4 rounded-xl font-black uppercase text-[9px] active:scale-95 transition-all">Финиш</button>`;
            } else acts.innerHTML = `<div class="col-span-3 text-center py-4 opacity-30 font-black uppercase text-[10px] italic">Работа завершена</div>`;
            document.getElementById('m-ticket').classList.remove('hidden');
        }
        async function showAssignModal() {
            const workers = await fetch('/admin/workers').then(r => r.json());
            selectedW = []; document.getElementById('selected-count').innerText = 0;
            document.getElementById('assign-list').innerHTML = workers.map(w => `
                <div id="w-${w.id}" onclick="toggleW(${w.id})" class="p-4 glass-card rounded-xl cursor-pointer transition-all flex justify-between items-center text-[10px] font-black uppercase">
                    <span>${w.full_name}</span><div class="w-4 h-4 rounded-full border-2 border-slate-300 c-icon flex items-center justify-center"></div>
                </div>`).join('');
            document.getElementById('m-assign').classList.remove('hidden');
        }
        function toggleW(id) {
            const card = document.getElementById(`w-${id}`), idx = selectedW.indexOf(id);
            if (idx > -1) { selectedW.splice(idx,1); card.classList.remove('border-blue-600','bg-blue-600/5'); card.querySelector('.c-icon').innerText=''; }
            else { selectedW.push(id); card.classList.add('border-blue-600','bg-blue-600/5'); card.querySelector('.c-icon').innerText='✓'; }
            document.getElementById('selected-count').innerText = selectedW.length;
        }
        async function confirmMultipleAssign() { await fetch(`/tickets/${currentTID}/assign`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(selectedW)}); closeModals(); loadData(); }
        async function setStatus(s) { await fetch(`/tickets/${currentTID}/status?status=${s}`, {method:'POST'}); closeModals(); loadData(); }
        function closeModals() { document.querySelectorAll('.modal-bg').forEach(m => m.classList.add('hidden')); }
    
      /* === БЛОК 14: КРАСНАЯ ЛИНИЯ (ИТОГОВАЯ ГЕОМЕТРИЯ) === */
        function updateMarker() {
            const nowLine = document.getElementById('current-time-marker');
            const nowBadge = document.getElementById('current-time-badge');
            
            // Если элемента нет на странице, выходим, чтобы не было ошибок
            if (!nowLine) return;

            const now = new Date();
            const currentHour = now.getHours();
            const currentMinutes = now.getMinutes();

            // Твой рабочий диапазон: с 6:00 до конца 23:00 (всего 18 часов в сетке)
            const startHour = 6;
            const endHour = 23;

            // Проверка диапазона (с 6:00 до 23:59)
            if (currentHour >= startHour && currentHour <= endHour) {
                // 1. Вычисляем общее количество минут в сетке (17 часов * 60)
                const totalHours = endHour - startHour; 
                const totalMinutes = totalHours * 60;
                
                // 2. Вычисляем сколько минут прошло с 06:00 утра
                const minutesPassed = (currentHour - startHour) * 60 + currentMinutes;
                
                // 3. Получаем чистый процент положения внутри контейнера сетки
                const positionPercent = (minutesPassed / totalMinutes) * 100;
                
                // 4. Применяем позицию (теперь без calc, так как маркер внутри контейнера сетки)
                nowLine.style.left = `calc(250px + (100% - 250px) * ${positionPercent} / 100)`;
                nowLine.style.display = 'block';

                // Обновляем текст на бейдже (HH:mm)
                if (nowBadge) {
                    nowBadge.innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                }
            } else {
                // Прячем линию вне рабочего времени
                nowLine.style.display = 'none';
            }
        }

    </script>
</body>
</html>
