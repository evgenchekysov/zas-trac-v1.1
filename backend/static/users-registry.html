</head>

<body class="bg-slate-100 flex min-h-screen">

    <!-- SIDEBAR -->

        <h2 class="text-2xl font-bold mb-8">ZAS‑TRAC</h2>

        <nav class="space-y-3">

            <a href="index.html"
               class="block px-3 py-2 rounded hover:bg-slate-700 text-slate-300 hover:text-white">
               Главная
            </a>

            <a href="scanner.html"
               class="block px-3 py-2 rounded hover:bg-slate-700 text-slate-300 hover:text-white">

            </a>

            <a href="tickets-dispatcher.html"
               class="block px-3 py-2 rounded hover:bg-slate-700 text-slate-300 hover:text-white">
               Диспетчер
            </a>

            <a href="my-tickets.html"
               class="block px-3 py-2 rounded hover:bg-slate-700 text-slate-300 hover:text-white">
               Мои заявки
            </a>

            <a href="assets-registry.html"
               class="block px-3 py-2 rounded hover:bg-slate-700 text-slate-300 hover:text-white">
               Активы
            </a>

            <!-- ✅ АКТИВНЫЙ ПУНКТ -->
            <a href="users-registry.html"
               class="block px-3 py-2 rounded bg-slate-700 text-white font-semibold">
               Пользователи
            </a>

            <a href="reports.html"
               class="block px-3 py-2 rounded hover:bg-slate-700 text-slate-300 hover:text-white">
               Отчёты
            </a>

        </nav>
    </aside>

    <!-- RIGHT PANEL -->
    <div class="flex-1 flex flex-col">

       
    <!-- HEADER -->
        <header class="w-full bg-white shadow-sm h-20 flex items-center justify-between px-6">

            <div class="flex flex-col">
                <h1 class="text-2xl font-bold text-slate-700">ПОЛЬЗОВАТЕЛИ</h1>

                <div class="flex items-center gap-6 text-slate-600 text-lg mt-1">
                    <span id="weekday"></span>

                    <span class="flex items-center gap-1">
                        📅 <span id="date-text"></span>
                    </span>

                    <span class="flex items-center gap-1">
                        ⏰ <span id="time-text"></span>
                    </span>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded-full bg-slate-300 flex items-center justify-center text-slate-700 text-xl">
                    👤
                </div>

                <button class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded font-semibold">
                    Выход
                </button>
            </div>

        </header>

        <!-- MAIN CONTENT -->
        <main class="p-6">

            <h2 class="text-2xl font-semibold text-slate-700 mb-6">
                Реестр пользователей
            </h2>

            <div class="bg-white border border-slate-200 rounded-lg shadow p-6">

                <p class="text-slate-600 text-lg mb-4">
                    Здесь будет отображаться список всех пользователей системы.
                </p>

                <div class="w-full h-40 bg-slate-200 rounded flex items-center justify-center text-slate-500 text-lg">
                    👥 Заглушка: таблица пользователей появится после подключения API
                </div>

            </div>

        </main>

    </div>


    <script>
    document.addEventListener("DOMContentLoaded", function () {
        function updateDateTime() {
            const now = new Date();

            const weekdays = [
                "Воскресенье","Понедельник","Вторник","Среда",
                "Четверг","Пятница","Суббота"
            ];

            const weekdayEl = document.getElementById("weekday");
            const dateEl = document.getElementById("date-text");
            const timeEl = document.getElementById("time-text");

            if (weekdayEl) weekdayEl.textContent = weekdays[now.getDay()];
            if (dateEl)
                dateEl.textContent = now.toLocaleDateString("ru-RU", {
                    day: "numeric",
                    month: "long",
                    year: "numeric"
                });
            if (timeEl)
                timeEl.textContent = now.toLocaleTimeString("ru-RU", {
                    hour: "2-digit",
                    minute: "2-digit"
                });
        }

        updateDateTime();
        setInterval(updateDateTime, 10000);
    });
    </script>

</body>
</html>
