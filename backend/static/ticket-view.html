<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ZAS‑TRAC — Заявка</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body class="bg-slate-100 min-h-screen flex">

    <!-- SIDEBAR (упрощённо, можно не трогать дальше) -->
    <aside class="bg-slate-900 text-white w-64 p-6 hidden md:block">
        <h2 class="text-2xl font-bold mb-8">ZAS‑TRAC</h2>

        <nav class="space-y-3">
            <a href="index.html" class="block px-3 py-2 rounded hover:bg-slate-700">
                ← Назад к списку
            </a>
        </nav>
    </aside>

    <!-- CONTENT -->
    <div class="flex-1 flex flex-col">

        <!-- HEADER -->
        <header class="bg-white shadow-sm h-20 flex items-center justify-between px-6">
            <h1 class="text-2xl font-bold text-slate-700">
                Карточка заявки
            </h1>
        </header>

        <!-- MAIN -->
        <main class="p-8 space-y-6">

            <!-- Заголовок заявки -->
            <div class="bg-white shadow rounded p-6 border-l-8 border-red-500">
                <h2 class="text-3xl font-bold text-slate-800">
                    Авария на насосе
                </h2>

                <div class="flex gap-6 text-slate-600 mt-3 text-lg">
                    <span>🔴 <strong>EMERGENCY</strong></span>
                    <span>Статус: <strong id="status-text">В работе</strong></span>
                    <span>Оборудование: <strong>Насос №1</strong></span>
                </div>
            </div>

            <!-- Исполнители -->
            <div class="bg-white shadow rounded p-6">
                <h3 class="text-xl font-bold text-slate-700 mb-3">
                    Исполнители
                </h3>

                <ul class="list-disc pl-6 text-slate-600">
                    <li>Иванов И.И.</li>
                    <li>Петров П.П.</li>
                </ul>
            </div>

            <!-- Действия -->
            <div class="bg-white shadow rounded p-6">
                <h3 class="text-xl font-bold text-slate-700 mb-4">
                    Действия
                </h3>

                <div class="flex flex-wrap gap-4">
                    <button onclick="setStatus('В работе')"
                        class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded font-semibold">
                        ▶ Начать работу
                    </button>

                    <button onclick="setStatus('Пауза')"
                        class="bg-yellow-500 hover:bg-yellow-600 text-white px-5 py-2 rounded font-semibold">
                        ⏸ Остановить
                    </button>

                    <button onclick="setStatus('Работы выполнены')"
                        class="bg-green-600 hover:bg-green-700 text-white px-5 py-2 rounded font-semibold">
                        ✅ Работы выполнены
                    </button>

                    <button onclick="setStatus('Закрыта')"
                        class="bg-slate-800 hover:bg-slate-900 text-white px-5 py-2 rounded font-semibold">
                        🔒 Закрыть заявку
                    </button>
                </div>
            </div>

        </main>
    </div>

    <!-- DEMO SCRIPT -->
     <script>
        function addTimelineEvent(ticketId, type, label) {
        const raw = localStorage.getItem("timeline");
        const timeline = raw ? JSON.parse(raw) : [];

        const now = new Date();
        const time = now.toLocaleTimeString("ru-RU", {
            hour: "2-digit",
            minute: "2-digit"
        });

        timeline.unshift({
            ticket_id: ticketId,
            type,
            label,
            time
        });

        localStorage.setItem("timeline", JSON.stringify(timeline));
        }
    </script>
    <script>        
        const params = new URLSearchParams(window.location.search);
        let TICKET_ID = params.get("id");

        // DEMO fallback
        if (!TICKET_ID) {
            TICKET_ID = "ticket-1";
        }
        /* ---------- Ticket Store ---------- */

        function getTicket() {
            const saved = localStorage.getItem(TICKET_ID);
            if (saved) return JSON.parse(saved);

            // seed-данные по ID (важно!)
            const seedMap = {
                "ticket-1": {
                    title: "Авария на насосе",
                    priority: "EMERGENCY",
                    status: "IN_PROGRESS",
                    asset: "Насос №1"
                },
                "ticket-2": {
                    title: "Плановый осмотр",
                    priority: "NORMAL",
                    status: "NEW",
                    asset: "Шкаф управления"
                }
            };

            const ticket = seedMap[TICKET_ID];
            if (!ticket) return null;

            localStorage.setItem(TICKET_ID, JSON.stringify(ticket));
            return ticket;
        }

        function renderTicket() {
            const ticket = getTicket();
            if (!ticket) return;

            document.getElementById("status-text").textContent = ticket.status;
        }

        
        function setStatus(newStatus) {
            const ticket = getTicket();
            ticket.status = newStatus;
            localStorage.setItem(TICKET_ID, JSON.stringify(ticket));

            // логируем событие
            if (newStatus === "В работе") {
                addTimelineEvent(TICKET_ID, "START", "Начата работа");
            }

            if (newStatus === "Пауза") {
                addTimelineEvent(TICKET_ID, "PAUSE", "Пауза");
            }

            if (newStatus === "Работы выполнены") {
                addTimelineEvent(TICKET_ID, "DONE", "Работы выполнены");
            }

            if (newStatus === "Закрыта") {
                addTimelineEvent(TICKET_ID, "CLOSED", "Заявка закрыта");
            }

            renderTicket();
        }


        renderTicket();
    </script>


</body>
</html>
