<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZAS‑TRAC — Диспетчер</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 flex min-h-screen">

<!-- SIDEBAR -->
<aside class="bg-slate-900 text-white w-64 p-6 hidden md:block">
    <h2 class="text-2xl font-bold mb-8">ZAS‑TRAC</h2>

    <nav class="space-y-3">
        <a href="index.html" class="block px-3 py-2 rounded hover:bg-slate-700">Главная</a>
        <a href="tickets-dispatcher.html" class="block px-3 py-2 rounded bg-slate-700 font-bold">Диспетчер</a>
    </nav>
</aside>

<!-- MAIN -->
<div class="flex-1 flex flex-col">

<header class="bg-white shadow h-16 flex items-center px-6 justify-between">
    <h1 class="text-xl font-bold text-slate-700">Диспетчер заявок</h1>

    <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded">
        Выход
    </button>
</header>

<main class="p-6">

    <h2 class="text-xl font-semibold text-slate-700 mb-4">
        Все заявки
    </h2>

    <div id="tickets" class="grid gap-4"></div>

</main>
</div>

<!-- SCRIPT -->
<script>
const API = "/tickets/";

// -----------------------------
// LOAD
// -----------------------------
async function loadTickets() {
    const token = localStorage.getItem("token");

    const res = await fetch(API, {
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    const tickets = await res.json();

    const container = document.getElementById("tickets");
    container.innerHTML = "";

    tickets.forEach(t => {
        const card = document.createElement("div");

        card.className = `
            bg-white p-4 rounded shadow border-l-8
            ${t.is_active ? "border-green-500" : "border-gray-300"}
        `;

        card.innerHTML = `
            <div class="flex justify-between items-center">

                <div>
                    <div class="text-lg font-bold">
                        Заявка #${t.id}
                    </div>

                    <div class="text-sm text-slate-600">
                        Статус: ${t.status}
                    </div>

                    <div class="text-sm">
                        <span class="${t.is_active ? 'text-green-600' : 'text-gray-400'}">
                            ${t.is_active ? '● ACTIVE' : '○ idle'}
                        </span>
                    </div>
                </div>

                <div class="flex gap-2">

                    <button onclick="start(${t.id})"
                        class="bg-blue-500 text-white px-3 py-1 rounded">
                        Start
                    </button>

                    <button onclick="join(${t.id})"
                        class="bg-slate-600 text-white px-3 py-1 rounded">
                        Join
                    </button>

                </div>
            </div>
        `;

        container.appendChild(card);
    });
}

// -----------------------------
// ACTIONS
// -----------------------------
async function start(id) {
    await fetch(`/tickets/${id}/start`, {
        method: "POST",
        headers: {
            "Authorization": "Bearer " + localStorage.getItem("token")
        }
    });

    loadTickets();
}

async function join(id) {
    await fetch(`/tickets/${id}/join`, {
        method: "POST",
        headers: {
            "Authorization": "Bearer " + localStorage.getItem("token")
        }
    });

    loadTickets();
}

function logout() {
    localStorage.removeItem("token");
    window.location.href = "login.html";
}

// -----------------------------
// AUTO REFRESH
// -----------------------------
loadTickets();
setInterval(loadTickets, 5000);

</script>

</body>
</html>
